<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="王者萌萌消 - King's Cute Match-3 Game" />
    <title>王者萌萌消 - King's Cute Match-3</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        font-family: 'Arial', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
      }

      #game-container {
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        border-radius: 10px;
        overflow: hidden;
      }

      #game-container canvas {
        display: block;
      }

      .loading {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #ffffff;
        font-size: 24px;
        text-align: center;
      }

      .loading::after {
        content: '...';
        animation: dots 1.5s infinite;
      }

      @keyframes dots {
        0%, 20% { content: '.'; }
        40% { content: '..'; }
        60%, 100% { content: '...'; }
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div class="loading" id="loading">Loading Game</div>
    </div>

    <script type="module" src="/src/frontend/main.ts"></script>
    <script>
      // Hide loading screen when game is ready
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loading = document.getElementById('loading');
          if (loading) {
            loading.style.display = 'none';
          }
        }, 1000);
      });
    </script>
  </body>
</html>
