<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 64">
  <!-- Card Type 1: Sword (Blue) -->
  <g id="card-sword">
    <rect x="0" y="0" width="64" height="64" rx="8" fill="#3B82F6"/>
    <path d="M32 12 L32 52 M20 24 L32 12 L44 24 M24 44 L40 44" 
          stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Card Type 2: Shield (Red) -->
  <g id="card-shield" transform="translate(64, 0)">
    <rect x="0" y="0" width="64" height="64" rx="8" fill="#EF4444"/>
    <path d="M20 20 L44 20 L44 36 Q44 48 32 52 Q20 48 20 36 Z" 
          stroke="white" stroke-width="3" fill="none" stroke-linejoin="round"/>
    <line x1="32" y1="20" x2="32" y2="52" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- Card Type 3: Potion (Green) -->
  <g id="card-potion" transform="translate(128, 0)">
    <rect x="0" y="0" width="64" height="64" rx="8" fill="#10B981"/>
    <circle cx="32" cy="36" r="12" stroke="white" stroke-width="3" fill="none"/>
    <rect x="28" y="18" width="8" height="8" fill="white"/>
    <circle cx="32" cy="14" r="4" fill="white"/>
  </g>
  
  <!-- Card Type 4: Crown (Gold) -->
  <g id="card-crown" transform="translate(192, 0)">
    <rect x="0" y="0" width="64" height="64" rx="8" fill="#F59E0B"/>
    <path d="M16 44 L16 28 L24 36 L32 24 L40 36 L48 28 L48 44 Z" 
          stroke="white" stroke-width="3" fill="none" stroke-linejoin="round"/>
    <circle cx="24" cy="28" r="2" fill="white"/>
    <circle cx="32" cy="24" r="2" fill="white"/>
    <circle cx="40" cy="28" r="2" fill="white"/>
  </g>
  
  <!-- Card Type 5: Gem (Purple) -->
  <g id="card-gem" transform="translate(256, 0)">
    <rect x="0" y="0" width="64" height="64" rx="8" fill="#8B5CF6"/>
    <polygon points="32,16 44,28 40,44 24,44 20,28" 
             stroke="white" stroke-width="3" fill="none" stroke-linejoin="round"/>
    <line x1="32" y1="16" x2="32" y2="44" stroke="white" stroke-width="1.5"/>
    <line x1="20" y1="28" x2="44" y2="28" stroke="white" stroke-width="1.5"/>
  </g>
  
  <!-- Card Type 6: Scroll (White) -->
  <g id="card-scroll" transform="translate(320, 0)">
    <rect x="0" y="0" width="64" height="64" rx="8" fill="#6B7280"/>
    <rect x="16" y="20" width="32" height="24" rx="2" stroke="white" stroke-width="3" fill="none"/>
    <line x1="20" y1="28" x2="44" y2="28" stroke="white" stroke-width="2"/>
    <line x1="20" y1="34" x2="40" y2="34" stroke="white" stroke-width="2"/>
    <line x1="20" y1="40" x2="36" y2="40" stroke="white" stroke-width="2"/>
  </g>
</svg>
