version: '3.8'

services:
  # Main game server
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: wangzhe-mengmengxiao-app
    ports:
      - "3000:3000"  # Frontend
      - "4000:4000"  # Backend API
    environment:
      - NODE_ENV=production
      - PORT=4000
      - REDIS_URL=redis://redis:6379
      - DATABASE_PATH=/app/data/game.db
    volumes:
      - app-data:/app/data
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - game-network

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: wangzhe-mengmengxiao-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - game-network

  # Nginx reverse proxy (optional, for production)
  nginx:
    image: nginx:alpine
    container_name: wangzhe-mengmengxiao-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - game-network

volumes:
  app-data:
    driver: local
  redis-data:
    driver: local

networks:
  game-network:
    driver: bridge
